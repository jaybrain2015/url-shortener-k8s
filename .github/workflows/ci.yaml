name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
         -  name: Check out the code  
            uses: actions/checkout@v4

         -  name: Set up python
            uses: actions/setup-python@v5
            with:
                python-version: "3.12"  
         
         -  name: install dependencies
            run:  pip install -r app/requirements.txt
            
         -  name: Run tests
            run: pytest
            working-directory: ./app
            
         - name: Build the Docker image
           run: docker build -t url-shortener:latest ./app   
           
         - name: Scan image for vulnerabilities
           uses: aquasecurity/trivy-action@master
           with:
            image-ref: url-shortener:latest
            format: table
            exit-code: "1"
            severity: CRITICAL,HIGH
            ignore-unfixed: true  

         - name: Log in to GitHub Container Registry
           uses: docker/login-action@v3
           with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

         - name: Tag and push the image
           run: |
            docker tag url-shortener:latest ghcr.io/jaybrain2015/url-shortener:latest
            docker push ghcr.io/jaybrain2015/url-shortener:latest
