apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shortener
  template:
    metadata:
      labels:
        app: shortener
    spec:
      containers:
        - name: app
          image: url-shortener
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://shortener:shortenerpass@db:5432/shortenerdb" 
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi    

---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  selector:
    app: shortener
  ports:
    - port: 8000
      targetPort: 8000